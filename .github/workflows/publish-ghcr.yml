# ==============================================================================
# GitHub Actions — Publish Docker Image to GHCR
# ==============================================================================
# Triggers when a tag is pushed or a release is published.
# Publishes image tags:
#   - <version-tag>
#   - latest
# ==============================================================================

name: Publish Container Image

on:
  push:
    tags:
      - "*"
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and Push GHCR Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]]; then
            version_tag="${{ github.event.release.tag_name }}"
          else
            version_tag="${{ github.ref_name }}"
          fi

          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"

          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"
          echo "image_repo=$image_repo" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.version_tag }}
            ${{ steps.meta.outputs.image_repo }}:latest
