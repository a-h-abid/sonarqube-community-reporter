# ==============================================================================
# GitHub Actions — Lint and Test
# ==============================================================================
# Runs ShellCheck and the bats test suite on every push and pull request.
# ==============================================================================

name: Lint and Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          shellcheck \
            scripts/sonar-report.sh \
            scripts/wait-for-analysis.sh \
            scripts/lib/*.sh

  test:
    name: bats test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats jq

      - name: Run tests
        run: bash tests/run_tests.sh
