name: sonarqube-community-reporter

services:
  # --------------------------------------------------------------------------
  # Report Tool (on-demand — activated with --profile report)
  # --------------------------------------------------------------------------
  report-tool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sonar-report-tool
    environment:
      SONAR_URL: ${SONAR_URL:-}
      SONAR_TOKEN: ${SONAR_TOKEN:-}
      SONAR_PROJECT_KEY: ${SONAR_PROJECT_KEY:-}
      SONAR_BRANCH: ${SONAR_BRANCH:-}
      SONAR_TASK_ID: ${SONAR_TASK_ID:-}
      POLL_INTERVAL: ${POLL_INTERVAL:-5}
      POLL_TIMEOUT: ${POLL_TIMEOUT:-300}
      REPORT_FORMATS: ${REPORT_FORMATS:-json,md,html,pdf,xlsx,ods}
      REPORT_OUTPUT_DIR: /reports
    volumes:
      - ./reports:/reports
    networks:
      - sonarnet

networks:
  sonarnet:
    driver: bridge
    name: 'sonarnet'
